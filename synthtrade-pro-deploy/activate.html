<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activar Licencia — SynthTrade Pro</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e17; color: #e5e7eb; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .container { max-width: 440px; width: 100%; }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo img { width: 64px; height: 64px; border-radius: 16px; object-fit: cover; border: 2px solid rgba(245,158,11,0.2); }
    .logo h1 { font-size: 24px; font-weight: 800; margin-top: 12px; }
    .logo h1 span { color: #f59e0b; }
    .logo p { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    .card { background: rgba(15,20,30,0.8); border: 1px solid rgba(245,158,11,0.2); border-radius: 16px; padding: 24px; backdrop-filter: blur(20px); }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .card .subtitle { font-size: 12px; color: #9ca3af; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 11px; color: #9ca3af; margin-bottom: 6px; font-weight: 600; }
    .form-group input { width: 100%; padding: 10px 14px; background: rgba(30,35,50,0.5); border: 1px solid rgba(55,65,81,0.5); border-radius: 10px; color: #e5e7eb; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: rgba(245,158,11,0.5); }
    .key-inputs { display: flex; gap: 6px; justify-content: center; margin: 12px 0; }
    .key-inputs input { width: 70px; text-align: center; font-family: monospace; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 12px 4px; background: rgba(30,35,50,0.5); border: 1px solid rgba(55,65,81,0.5); border-radius: 10px; color: #fbbf24; outline: none; }
    .key-inputs input:focus { border-color: rgba(245,158,11,0.5); }
    .key-inputs .dash { color: #4b5563; font-size: 20px; font-weight: 700; line-height: 46px; }
    .device-id { background: rgba(30,35,50,0.3); border: 1px solid rgba(55,65,81,0.3); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .device-id code { font-family: monospace; font-size: 12px; color: #60a5fa; flex: 1; word-break: break-all; }
    .device-id label { font-size: 10px; color: #9ca3af; }
    .btn { width: 100%; padding: 14px; font-size: 14px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #d97706; color: white; }
    .btn-primary:hover { background: #f59e0b; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-success { background: #059669; color: white; }
    .btn-success:hover { background: #10b981; }
    .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 12px; border-radius: 10px; font-size: 12px; margin-bottom: 16px; display: none; }
    .error.show { display: flex; align-items: center; gap: 8px; }
    .success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #34d399; padding: 16px; border-radius: 12px; font-size: 13px; text-align: center; display: none; }
    .success.show { display: block; }
    .info { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.3); color: #93c5fd; padding: 10px; border-radius: 10px; font-size: 11px; margin-bottom: 16px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="container" id="activateScreen">
    <div class="logo">
      <img src="/logo-a2k-pro.png" alt="SynthTrade Pro" />
      <h1>SynthTrade<span>Pro</span></h1>
      <p>by A2K Digital Studio</p>
    </div>

    <div class="card">
      <h2 style="color: #fbbf24;">Activar Licencia PRO</h2>
      <p class="subtitle">Ingresa tu clave de licencia para comenzar</p>

      <!-- Device ID -->
      <div class="device-id">
        <div>
          <label>ID de Dispositivo</label>
          <code id="deviceId">Calculando...</code>
        </div>
      </div>

      <!-- License Key -->
      <div class="form-group">
        <label>Clave de Licencia</label>
        <div class="key-inputs">
          <input type="text" id="k1" maxlength="5" placeholder="XXXXX" />
          <span class="dash">-</span>
          <input type="text" id="k2" maxlength="5" placeholder="XXXXX" />
          <span class="dash">-</span>
          <input type="text" id="k3" maxlength="5" placeholder="XXXXX" />
          <span class="dash">-</span>
          <input type="text" id="k4" maxlength="5" placeholder="XXXXX" />
          <span class="dash">-</span>
          <input type="text" id="k5" maxlength="5" placeholder="XXXXX" />
        </div>
      </div>

      <!-- Info -->
      <div class="info">
        Pega la licencia que recibiste del administrador. Tu dispositivo queda vinculado de forma permanente.
      </div>

      <!-- Error -->
      <div id="errorMsg" class="error">
        <span>&#10060;</span>
        <span id="errorText">Error</span>
      </div>

      <!-- Success -->
      <div id="successMsg" class="success">
        <div style="font-size: 32px; margin-bottom: 8px;">&#9989;</div>
        <div style="font-weight: 700; margin-bottom: 4px;">Licencia Activada!</div>
        <div id="successInfo" style="font-size: 11px; color: #9ca3af;"></div>
        <button class="btn btn-success" style="margin-top: 12px;" onclick="goToBot()">Entrar al Bot &#8594;</button>
      </div>

      <!-- Activate Button -->
      <button id="activateBtn" class="btn btn-primary" onclick="activate()">
        Activar Licencia
      </button>
    </div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAeCKJZqE8xb5YvniZhJ6CODCRS0t5W-SI",
      authDomain: "synthtrade-pro.firebaseapp.com",
      databaseURL: "https://synthtrade-pro-default-rtdb.firebaseio.com",
      projectId: "synthtrade-pro",
      storageBucket: "synthtrade-pro.firebasestorage.app",
      messagingSenderId: "336497532355",
      appId: "1:336497532355:web:316ccb205fda8729e8f176"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Generate Device Fingerprint
    function getFingerprint() {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillText('SynthTradePro-FP-2024', 2, 2);

        const canvasData = canvas.toDataURL();
        const screenInfo = `${screen.width}x${screen.height}x${screen.colorDepth}`;
        const navInfo = navigator.userAgent;
        const langInfo = navigator.language;
        const platformInfo = navigator.platform;
        const hardwareInfo = navigator.hardwareConcurrency || '';
        const tzInfo = Intl.DateTimeFormat().resolvedOptions().timeZone;

        let glInfo = '';
        try {
          const gl = document.createElement('canvas').getContext('webgl');
          if (gl) {
            const ext = gl.getExtension('WEBGL_debug_renderer_info');
            if (ext) {
              glInfo = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
            }
          }
        } catch (e) {}

        const raw = canvasData + '|' + screenInfo + '|' + navInfo + '|' + langInfo + '|' + platformInfo + '|' + hardwareInfo + '|' + tzInfo + '|' + glInfo;

        let hash = 0;
        for (let i = 0; i < raw.length; i++) {
          const ch = raw.charCodeAt(i);
          hash = ((hash << 5) - hash) + ch;
          hash |= 0;
        }

        resolve(Math.abs(hash).toString(16).toUpperCase().padStart(16, '0'));
      });
    }

    // Key inputs auto-advance
    const keyInputs = [
      document.getElementById('k1'),
      document.getElementById('k2'),
      document.getElementById('k3'),
      document.getElementById('k4'),
      document.getElementById('k5')
    ];

    keyInputs.forEach((input, idx) => {
      input.addEventListener('input', (e) => {
        let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (val.length > 5) val = val.substring(0, 5);
        e.target.value = val;
        if (val.length === 5 && idx < 4) {
          keyInputs[idx + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && idx > 0) {
          keyInputs[idx - 1].focus();
        }
      });
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData('text').toUpperCase().replace(/[^A-Z0-9-]/g, '');
        const parts = text.split('-');
        if (parts.length === 5) {
          parts.forEach((p, i) => {
            if (keyInputs[i]) keyInputs[i].value = p.substring(0, 5);
          });
          keyInputs[4].focus();
        }
      });
    });

    // Initialize
    (async () => {
      const fp = await getFingerprint();
      document.getElementById('deviceId').textContent = fp;
    })();

    // Show error
    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMsg').classList.add('show');
      setTimeout(() => document.getElementById('errorMsg').classList.remove('show'), 5000);
    }

    // Activate license
    async function activate() {
      const parts = keyInputs.map(i => i.value.toUpperCase().replace(/[^A-Z0-9]/g, ''));
      if (parts.some(p => p.length !== 5)) {
        showError('Ingresa la licencia completa de 5 bloques');
        return;
      }

      const key = parts.join('-');
      const fp = document.getElementById('deviceId').textContent;
      const btn = document.getElementById('activateBtn');

      btn.disabled = true;
      btn.textContent = 'Activando...';
      document.getElementById('errorMsg').classList.remove('show');

      try {
        // 1. Get license from Firebase
        const snap = await db.ref('licenses/' + key).once('value');

        if (!snap.exists()) {
          showError('Licencia no encontrada. Verifica la clave.');
          btn.disabled = false;
          btn.textContent = 'Activar Licencia';
          return;
        }

        const data = snap.val();

        if (data.status === 'blocked') {
          showError('Esta licencia ha sido bloqueada. Contacta al administrador.');
          btn.disabled = false;
          btn.textContent = 'Activar Licencia';
          return;
        }

        if (data.status === 'paused') {
          showError('Esta licencia esta pausada. Contacta al administrador.');
          btn.disabled = false;
          btn.textContent = 'Activar Licencia';
          return;
        }

        // Check device binding
        if (data.deviceId && data.deviceId !== '' && data.deviceId !== fp) {
          showError('Esta licencia ya esta vinculada a otro dispositivo. Contacta al administrador para transferirla.');
          btn.disabled = false;
          btn.textContent = 'Activar Licencia';
          return;
        }

        // 2. Bind device to license
        await db.ref('licenses/' + key).update({
          deviceId: fp,
          status: 'active',
          updatedAt: Date.now()
        });

        // 3. Save to localStorage (same keys the bot uses)
        localStorage.setItem('stp_license_key', key);
        localStorage.setItem('stp_license_status', 'active');
        localStorage.setItem('stp_license_owner', data.owner || '');
        localStorage.setItem('stp_license_email', data.email || '');

        // Clear any demo data
        localStorage.removeItem('stp_demo_start');
        localStorage.removeItem('stp_demo_expires');
        localStorage.removeItem('stp_demo_owner');
        localStorage.removeItem('stp_demo_email');

        // 4. Show success
        const daysLeft = data.expiresAt ? Math.ceil((data.expiresAt - Date.now()) / 86400000) : 999;
        document.getElementById('successInfo').textContent = 
          `Titular: ${data.owner || 'N/A'} | Plan: ${data.plan || 'PRO'} | ${daysLeft} dias restantes`;
        
        document.getElementById('activateBtn').classList.add('hidden');
        document.getElementById('successMsg').classList.add('show');

      } catch (err) {
        console.error('Activation error:', err);
        showError('Error de conexion. Intenta de nuevo.');
        btn.disabled = false;
        btn.textContent = 'Activar Licencia';
      }
    }

    // Go to bot
    function goToBot() {
      window.location.href = '/';
    }
  </script>
</body>
</html>
